<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Vignesh Tea Shop</title>
    <style>
        /* Internal CSS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            text-align: center;
            color: #333;
        }

        header {
            background-color: #d32f2f; /* Red Theme */
            color: white;
            padding: 30px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .container {
            width: 70%;
            max-width: 600px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            color: #d32f2f;
            margin-bottom: 25px;
            font-size: 24px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .contact-details {
            text-align: left;
            margin: 0 auto;
            display: inline-block;
        }

        .contact-item {
            margin: 15px 0;
            font-size: 18px;
        }

        .contact-item strong {
            color: #555;
            display: inline-block;
            width: 100px;

        }

        .btn-back {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            background-color: #d32f2f;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn-back:hover {
            background-color: #b71c1c;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        Vignesh Tea Shop
    </header>

    <div class="container">
        <h2>CONTACT INFORMATION</h2>
        
        <div class="contact-details">
            <div class="contact-item"><strong>Address:</strong> 123 Tea Garden St, Tamil Nadu</div>
            <div class="contact-item"><strong>Phone:</strong> <a href="tel:+919876543210">+91 7094928195 </a></div>
            <div class="contact-item"><strong>Email:</strong> <a href="mailto:vikkysathish608@gmail.com">vikkysathish608@gmail.com</a></div>
            <div class="contact-item"><strong>Hours:</strong> 6:00 AM - 10:00 PM</div>
        </div>

        <br>
        <a href="index.html" class="btn-back">Back to Home</a>
    </div>

    <footer>
        &copy; 2026 Vignesh Tea Shop | Built with Passion
